<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molecular Models Showcase</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    h1,
    h2,
    h3 {
      font-family: 'Outfit', sans-serif;
      margin: 0;
    }

    /* Sticky Header */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgb(255 255 255 / 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
    }

    @media (min-width: 640px) {
      header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .brand p {
      margin: 0;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 400px;
    }

    .search-input {
      width: 100%;
      padding: 0.625rem 1rem 0.625rem 2.5rem;
      border: 1px solid var(--border);
      border-radius: 9999px;
      /* Pill shape */
      font-size: 0.95rem;
      background: var(--bg);
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgb(79 70 229 / 0.15);
      background: white;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Main Content */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      padding-bottom: 3rem;
    }

    /* Card Styling */
    .card {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: rgb(79 70 229 / 0.3);
    }

    .card-image-wrapper {
      position: relative;
      width: 100%;
      padding-top: 66.66%;
      /* 3:2 Aspect Ratio */
      background: #f1f5f9;
      overflow: hidden;
    }

    .card-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.5s ease-in-out, transform 0.5s ease;
      z-index: 1;
    }

    .card:hover .card-img {
      transform: scale(1.05);
    }

    .badges {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      z-index: 10;
    }

    .badge {
      background: rgb(255 255 255 / 0.9);
      backdrop-filter: blur(4px);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-main);
      box-shadow: 0 2px 4px rgb(0 0 0 / 0.05);
    }

    .badge-pack {
      background: rgb(15 23 42 / 0.8);
      color: white;
    }

    .card-content {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-transform: capitalize;
    }

    .smiles-code {
      display: inline-block;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 0.8rem;
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text-muted);
      margin-bottom: 1rem;
      word-break: break-all;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      background: #e0e7ff;
      color: var(--primary);
      border-radius: 6px;
      font-weight: 500;
    }

    .btn-action {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.75rem;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-weight: 500;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .btn-action:hover {
      background: var(--primary-hover);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.875rem;
      background: var(--surface);
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <h1>3D Printable Molecular Models</h1>
      <p>
        Calculated with molecular force field<br>
        Backed by quantum mechanics and experimental data
      </p>
    </div>
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" class="search-input" placeholder="Search molecules, packs, or concepts..."
        aria-label="Search">
    </div>
  </header>

  <main>
    <div id="catalog" class="grid">
      <!-- Cards will be injected here -->
    </div>
  </main>

  <footer>
    <p>© 2025 Molecular Models · <a href="https://makerworld.com/en/%40Mira/collections?order=title&status=2"
        target="_blank">View on MakerWorld</a></p>
  </footer>

  <script>
    let molecules = [];
    let globalImageIndex = 0;

    // Initialize
    fetch("./molecules.json")
      .then(res => {
        console.log("Fetch response:", res);
        return res.json();
      })
      .then(data => {
        console.log("Data loaded successfully:", data);
        console.log("Number of molecules:", data.length);
        molecules = data;
        render(molecules);

        // Start Image Carousel (15 seconds)
        setInterval(cycleImages, 15000);
      })
      .catch(err => {
        console.error("Failed to load data:", err);
        document.getElementById('catalog').innerHTML = `<div class="empty-state">Error loading data. Check console.</div>`;
      });

    // Search Logic
    document.getElementById("search").addEventListener("input", (e) => {
      const term = e.target.value.toLowerCase().trim();
      if (!term) {
        render(molecules);
        return;
      }

      // Split term into multiple keywords for better searching (optional)
      // For now, strict inclusion
      const filtered = molecules.filter(m => {
        const searchString = [
          m.name,
          m.pack,
          m.smiles,
          m.category,
          ...(m.concepts || [])
        ].join(" ").toLowerCase();
        return searchString.includes(term);
      });

      render(filtered);
    });

    // Format pack name for display (e.g., "pack_01_alkanes" -> "Pack 01: Alkanes")
    function formatPackName(pack) {
      if (!pack) return "";
      return pack.replace(/pack_(\d+)_/i, "Pack $1: ").replace(/_/g, " ");
    }

    function render(items) {
      const container = document.getElementById("catalog");
      container.innerHTML = "";

      if (items.length === 0) {
        container.innerHTML = `<div class="empty-state">No molecules found matching your search.</div>`;
        return;
      }

      items.forEach(m => {
        const card = document.createElement("article");
        card.className = "card";

        // Store images for carousel
        // Escape potential quotes in JSON if necessary, simplistic replace for now
        const imagesJson = JSON.stringify(m.images || []).replace(/"/g, '&quot;');
        card.setAttribute('data-images', imagesJson);

        const firstImage = (m.images && m.images.length > 0) ? m.images[0] : "https://placehold.co/600x400/e2e8f0/64748b?text=No+Image";

        // Use existing metadata logic if available, otherwise graceful fallback
        const tagsHtml = (m.concepts || []).slice(0, 5).map(topic =>
          `<span class="tag">${topic}</span>`
        ).join('');

        const packDisplayName = formatPackName(m.pack);

        const smilesHtml = m.smiles ? `<code class="smiles-code">${m.smiles}</code>` : '';

        card.innerHTML = `
        <div class="card-image-wrapper">
          <div class="badges">
            ${m.category ? `<span class="badge">${m.category}</span>` : ''}
            <span class="badge badge-pack">${packDisplayName}</span>
          </div>
          <img 
            src="${firstImage}" 
            class="card-img"
            alt="3D Model of ${m.name}"
            loading="lazy"
            onerror="this.src='https://placehold.co/600x400/e2e8f0/64748b?text=No+Image'"
          >
        </div>
        <div class="card-content">
          <h3>${m.name}</h3>
          ${smilesHtml}
          <div class="tags">
            ${tagsHtml}
          </div>
          <a href="${m.makerworld_url || 'https://makerworld.com/en/@Mira/collections?order=title&status=2'}" 
             target="_blank" 
             class="btn-action">
            Download Model
          </a>
        </div>
      `;

        container.appendChild(card);
      });
    }

    function cycleImages() {
      globalImageIndex++;
      const cards = document.querySelectorAll('.card');

      cards.forEach(card => {
        const rawImages = card.getAttribute('data-images');
        if (!rawImages) return;

        try {
          const images = JSON.parse(rawImages.replace(/&quot;/g, '"'));
          if (images.length > 1) {
            const imgEl = card.querySelector('.card-img');
            // Start loading next image
            const nextIndex = globalImageIndex % images.length;
            const nextSrc = images[nextIndex];

            if (imgEl && nextSrc) {
              imgEl.style.opacity = '0.5'; // Fade out slightly
              setTimeout(() => {
                imgEl.src = nextSrc;
                imgEl.style.opacity = '1';
              }, 200);
            }
          }
        } catch (e) {
          // Ignore parsing errors
        }
      });
    }
  </script>

</body>

</html>
