<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Molecular Models for Chemistry Education</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      background: #f6f7f8;
      color: #222;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }

    header h1 {
      margin: 0 0 0.5rem 0;
    }

    header p {
      max-width: 700px;
      margin: 0 auto;
      opacity: 0.9;
    }

    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .search-box {
      margin-bottom: 2rem;
    }

    input[type="search"] {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #eee;
    }

    .card-content {
      padding: 1rem;
      flex: 1;
    }

    .card h3 {
      margin: 0 0 0.5rem 0;
    }

    .meta {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 0.5rem;
    }

    .tags {
      font-size: 0.85rem;
      color: #334155;
    }

    .card a {
      display: block;
      padding: 0.75rem;
      text-align: center;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .card a:hover {
      background: #1d4ed8;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>

<header>
  <h1>3D Molecular Models for Chemistry Education</h1>
  <p>
    Physically accurate, 3D‑printable molecular models generated from SMILES
    and optimized for classroom use.
  </p>
</header>

<main>
  <div class="search-box">
    <input
      type="search"
      id="search"
      placeholder="Search by name, SMILES, CAS, or concept (e.g. chirality, aromaticity)"
    />
  </div>

  <div id="catalog" class="grid"></div>
</main>

<footer>
  © Your Name · PhD Chemistry ·
  <a href="https://makerworld.com" target="_blank">MakerWorld</a>
</footer>

<script>
  let molecules = [];

  fetch("molecules.json")
    .then(response => response.json())
    .then(data => {
      molecules = data;
      render(molecules);
    });

  document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    const filtered = molecules.filter(m =>
      Object.values(m).join(" ").toLowerCase().includes(q)
    );
    render(filtered);
  });

  function render(items) {
    const catalog = document.getElementById("catalog");
    catalog.innerHTML = "";

    items.forEach(m => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${m.image || "images/placeholder.jpg"}" alt="${m.name}">
        <div class="card-content">
          <h3>${m.name}</h3>
          <div class="meta">
            SMILES: <code>${m.smiles}</code>
          </div>
          <div class="tags">
            Concepts: ${m.concepts.join(", ")}
          </div>
        </div>
        <a href="${m.makerworld_url}" target="_blank">
          View / Download Model
        </a>
      `;

      catalog.appendChild(card);
    });
  }
</script>

</body>
</html>
