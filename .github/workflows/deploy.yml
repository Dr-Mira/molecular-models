name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main code
        uses: actions/checkout@v4

      - name: Checkout private assets
        uses: actions/checkout@v4
        with:
          repository: Dr-Mira/molecular-models-assets
          path: assets
          token: ${{ secrets.ASSETS_REPO_TOKEN }}

      - name: Debug Assets
        run: |
          ls -R assets | head -n 20
          echo "Checking for molecules..."

      - name: Generate molecules.json
        shell: pwsh
        run: |
          ./generate_json.ps1
          if (Test-Path "molecules.json") {
            $content = Get-Content "molecules.json" -Raw
            Write-Host "molecules.json generated. Size: $($content.Length)"
            if ($content.Length -lt 10) { Write-Error "molecules.json is too small!" }
          } else {
            Write-Error "molecules.json NOT FOUND!"
          }

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
