name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main code
        uses: actions/checkout@v4

      - name: Checkout private assets
        uses: actions/checkout@v4
        with:
          repository: Dr-Mira/molecular-models-assets
          path: assets
          token: ${{ secrets.ASSETS_REPO_TOKEN }}

      - name: Generate molecules.json
        shell: pwsh
        run: |
          ./generate_json.ps1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
